<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" />
  <!-- Magnifying glass handle -->
  <line x1="80" y1="80" x2="98" y2="98" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="54" cy="54" r="26" fill="none" stroke="#fff" stroke-width="8"/>
  <!-- Inner lens highlight -->
  <circle cx="46" cy="46" r="8" fill="rgba(255,255,255,0.25)"/>
</svg>

<svg width="820" height="360" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dev-lens demo output">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #1f2937; stroke-width: 2; }
      .title { fill: #e5e7eb; font: 600 18px "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .text { fill: #cbd5f5; font: 14px "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .accent { fill: #22d3ee; }
      .ok { fill: #4ade80; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="820" height="360" rx="18" />
